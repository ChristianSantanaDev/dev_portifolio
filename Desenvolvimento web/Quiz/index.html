<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quizAleatorio</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h3>Quiz: Adivinhe o resultado</h3>
            <div class="operacao">
                <p class="op1"></p> 
                <p class="sn"></p> 
                <p class="op2"></p> 
                <p>?</p>
            </div>

            <div class="alternativas">
                <button class="btn-res um" data-botao="1"></button>
                <button class="btn-res dois" data-botao="2"></button>
                <button class="btn-res tres" data-botao="3"></button>
                <button class="btn-res quatro" data-botao="4"></button>
            </div>
            <p class="resposta"></p>
        </div>
    </div>
</body>
</html>
